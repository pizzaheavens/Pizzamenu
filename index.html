
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven Pizza - هافين بيتزا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #008450; --orange: #fbb03b; --bg: #f4f7f6; --white: #ffffff; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--dark); }
        
        header { background: var(--green); color: white; text-align: center; padding: 30px 15px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hero-text h1 { margin: 0; font-size: 2rem; }
        
        .tabs { display: flex; overflow-x: auto; padding: 15px; gap: 10px; position: sticky; top: 0; background: var(--bg); z-index: 100; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { background: var(--white); padding: 10px 25px; border-radius: 50px; white-space: nowrap; cursor: pointer; border: 1px solid #eee; font-weight: 700; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab.active { background: var(--orange); color: white; border-color: var(--orange); transform: scale(1.05); }

        .container { padding: 0 15px; max-width: 600px; margin: auto; }
        
        .product-card { background: var(--white); border-radius: 20px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.04); transition: 0.2s; cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; margin-left: 15px; }
        .product-info { flex: 1; }
        .product-info h3 { margin: 0 0 5px; font-size: 1.05rem; color: #222; }
        .product-info p { margin: 0; font-size: 0.8rem; color: #777; line-height: 1.4; }
        .price-tag { color: var(--green); font-weight: 800; margin-top: 5px; display: block; font-size: 0.95rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: flex-end; }
        .modal-content { background: var(--white); width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .option-group { margin-bottom: 20px; }
        .option-group label { display: block; margin-bottom: 10px; font-weight: 700; color: #444; }
        
        .size-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .size-btn { border: 2px solid #eee; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 0.9rem; }
        .size-btn.selected { border-color: var(--green); background: #f0fdf4; color: var(--green); }

        .qty-control { display: flex; align-items: center; gap: 20px; background: #f1f1f1; padding: 5px 15px; border-radius: 50px; width: fit-content; }
        .qty-btn { background: var(--white); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-main { background: var(--green); color: white; width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }

        .cart-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--dark); color: white; padding: 15px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 500; display: none; cursor: pointer; }
        .cart-count { background: var(--orange); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.9rem; margin-right: 10px; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .customer-form input, .customer-form select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <h1>Heaven Pizza 🍕</h1>
    <p>مذاق لا يُنسى في قلب العيزرية</p>
</header>

<div class="tabs" id="tabs">
    <div class="tab active" onclick="filterMenu('pizza', event)">البيتزا</div>
    <div class="tab" onclick="filterMenu('sand', event)">الساندوتشات والوجبات</div>
    <div class="tab" onclick="filterMenu('salad', event)">السلطات</div>
    <div class="tab" onclick="filterMenu('app', event)">المقبلات</div>
</div>

<div class="container" id="menu-grid"></div>

<div class="modal" id="productModal">
    <div class="modal-content">
        <h2 id="mTitle" style="margin:0"></h2>
        <p id="mDesc" style="color:#666; font-size:0.9rem; margin: 10px 0;"></p>
        
        <div class="option-group">
            <label>اختر الحجم أو النوع:</label>
            <div class="size-grid" id="mSizes"></div>
        </div>

        <div class="option-group" id="mExtraGroup" style="display:none">
            <label>إضافات:</label>
            <div style="background:#f9f9f9; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                <span>أطراف محشوة بالجبنة 🧀</span>
                <input type="checkbox" id="mCrust" onchange="calculateLivePrice()" style="width:22px; height:22px;">
            </div>
        </div>

        <div class="option-group">
            <label>الكمية:</label>
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span id="mQty" style="font-weight:700; font-size:1.2rem;">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
        </div>

        <button class="btn-main" id="addBtn" onclick="addToCart()">إضافة إلى السلة</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<div class="modal" id="cartModal">
    <div class="modal-content">
        <h3>سلة الطلبات 🛒</h3>
        <div id="cartItemsList"></div>
        
        <div class="customer-form" style="margin-top:20px;">
            <input type="text" id="custName" placeholder="الاسم الكامل">
            <input type="text" id="custLoc" placeholder="العنوان بالتفصيل">
            <select id="orderType">
                <option value="توصيل">توصيل للمنزل</option>
                <option value="استلام من المطعم">استلام من المطعم</option>
            </select>
        </div>

        <button class="btn-main" style="background:#25D366" onclick="checkout()">تأكيد الطلب (WhatsApp) ✅</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:#999; margin-top:15px;">إغلاق</button>
    </div>
</div>

<div class="cart-bar" id="cartBar" onclick="openCart()">
    <span>عرض السلة <span class="cart-count" id="cCount">0</span></span>
    <span id="cTotal">0 ₪</span>
</div>

        // APPETIZERS

    function filterMenu(cat, e) {
        if(e) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
        }
        const grid = document.getElementById('menu-grid');
        const filtered = products.filter(p => p.cat === cat);
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProduct(${p.id})">
                <img src="${p.img}" class="product-img">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                    <span class="price-tag">السعر: ${Object.values(p.prices)[0]} ₪</span>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        currentP = products.find(p => p.id === id);
        selectedSize = Object.keys(currentP.prices)[0];
        currentQty = 1;
        document.getElementById('mQty').innerText = currentQty;
        document.getElementById('mTitle').innerText = currentP.name;
        document.getElementById('mDesc').innerText = currentP.desc;
        
        // إظهار خيار أطراف الجبنة فقط للبيتزا
        document.getElementById('mExtraGroup').style.display = currentP.cat === 'pizza' ? 'block' : 'none';
        document.getElementById('mCrust').checked = false;
        
        renderSizes();
        calculateLivePrice();
        document.getElementById('productModal').style.display = 'flex';
    }

    function renderSizes() {
        const container = document.getElementById('mSizes');
        container.innerHTML = Object.keys(currentP.prices).map(s => `
            <div class="size-btn ${s === selectedSize ? 'selected' : ''}" onclick="selectSize('${s}')">
                ${s}<br><small>${currentP.prices[s]} ₪</small>
            </div>
        `).join('');
    }

    function selectSize(s) {
        selectedSize = s;
        renderSizes();
        calculateLivePrice();
    }

    function updateQty(v) {
        currentQty = Math.max(1, currentQty + v);
        document.getElementById('mQty').innerText = currentQty;
        calculateLivePrice();
    }

    function calculateLivePrice() {
        let base = currentP.prices[selectedSize];
        let extra = 0;
        if(currentP.cat === 'pizza' && document.getElementById('mCrust').checked) {
            extra = selectedSize === 'S' ? 10 : (selectedSize === 'M' ? 15 : 20);
        }
        document.getElementById('addBtn').innerText = `إضافة إلى السلة (${(base + extra) * currentQty} ₪)`;
    }

    function addToCart() {
        let base = currentP.prices[selectedSize];
        let extraPrice = 0;
        let extraText = "";
        
        if(currentP.cat === 'pizza' && document.getElementById('mCrust').checked) {
            extraPrice = selectedSize === 'S' ? 10 : (selectedSize === 'M' ? 15 : 20);
            extraText = " + أطراف جبنة";
        }

        cart.push({
            name: currentP.name,
            size: selectedSize,
            qty: currentQty,
            total: (base + extraPrice) * currentQty,
            details: extraText
        });

        updateCartUI();
        closeModals();
    }

    function updateCartUI() {
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        const total = cart.reduce((sum, item) => sum + item.total, 0);
        document.getElementById('cCount').innerText = count;
        document.getElementById('cTotal').innerText = total + " ₪";
        document.getElementById('cartBar').style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function openCart() {
        const list = document.getElementById('cartItemsList');
        if(cart.length === 0) {
            list.innerHTML = "<p style='text-align:center'>السلة فارغة</p>";
        } else {
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong> <small>(${item.size})</small> x${item.qty}
                        <div style="font-size:0.75rem; color:var(--orange)">${item.details}</div>
                    </div>
                    <div>
                        <span>${item.total} ₪</span>
                        <button onclick="removeFromCart(${index})" style="background:none; border:none; color:red; margin-right:15px; cursor:pointer; font-size:1.1rem;">✕</button>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('cartModal').style.display = 'flex';
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
        if(cart.length === 0) closeModals();
        else openCart();
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function checkout() {
        const name = document.getElementById('custName').value;
        const loc = document.getElementById('custLoc').value;
        if(!name || !loc) return alert("يرجى إدخال الاسم والعنوان لإتمام الطلب");

        let msg = `🍕 *طلب جديد من هافين بيتزا*\n\n`;
        msg += `👤 *الزبون:* ${name}\n📍 *العنوان:* ${loc}\n🚚 *النوع:* ${document.getElementById('orderType').value}\n\n`;
        msg += `--- *الأصناف* ---\n`;
        
        cart.forEach((item, i) => {
            msg += `${i+1}. ${item.name} (${item.size}) x${item.qty}${item.details ? ' ['+item.details+']' : ''}\n💰 ${item.total} ₪\n\n`;
        });

        const finalTotal = cart.reduce((sum, item) => sum + item.total, 0);
        msg += `------------------\n💵 *الإجمالي النهائي: ${finalTotal} ₪*`;
        
        window.open(`https://wa.me/${whatsappNum}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // التشغيل الافتراضي
    filterMenu('pizza');
</script>
</body>
</html>
