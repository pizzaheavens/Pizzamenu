<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven Pizza - هافين بيتزا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #008450; --orange: #fbb03b; --bg: #f4f7f6; --white: #ffffff; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--dark); }
        
        header { background: var(--green); color: white; text-align: center; padding: 30px 15px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* --- لوحة الإعلانات القابلة للضغط --- */
        .ads-slider {
            margin: 20px 15px;
            height: 170px;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .ad-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: flex-end;
            background-size: cover;
            background-position: center;
        }
        .ad-slide.active { opacity: 1; }
        .ad-overlay {
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            width: 100%;
            padding: 20px 15px;
            color: white;
        }
        .ad-overlay h2 { margin: 0; font-size: 1.3rem; color: var(--orange); }
        .ad-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; position: absolute; top: 15px; left: 15px; font-weight: bold; }

        /* --- التبويبات --- */
        .tabs { display: flex; overflow-x: auto; padding: 15px; gap: 10px; position: sticky; top: 0; background: var(--bg); z-index: 100; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { background: var(--white); padding: 10px 25px; border-radius: 50px; white-space: nowrap; cursor: pointer; border: 1px solid #eee; font-weight: 700; transition: 0.3s; }
        .tab.active { background: var(--orange); color: white; border-color: var(--orange); }

        .container { padding: 0 15px; max-width: 600px; margin: auto; }
        .product-card { background: var(--white); border-radius: 20px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.04); cursor: pointer; }
        .product-img { width: 95px; height: 95px; border-radius: 15px; object-fit: cover; margin-left: 15px; }
        .product-info { flex: 1; }
        .price-tag { color: var(--green); font-weight: 800; margin-top: 5px; display: block; }

        /* --- المودال --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: flex-end; }
        .modal-content { background: var(--white); width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .option-group { margin-bottom: 20px; }
        .size-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .size-btn { border: 2px solid #eee; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: 600; }
        .size-btn.selected { border-color: var(--green); background: #f0fdf4; color: var(--green); }
        
        .qty-control { display: flex; align-items: center; gap: 20px; background: #f1f1f1; padding: 5px 15px; border-radius: 50px; width: fit-content; margin-top: 10px; }
        .qty-btn { background: var(--white); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-main { background: var(--green); color: white; width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }

        /* --- السلة --- */
        .cart-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--dark); color: white; padding: 15px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 500; display: none; cursor: pointer; }
        .cart-count { background: var(--orange); color: white; padding: 2px 10px; border-radius: 10px; margin-right: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .customer-form input, .customer-form select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
    </style>
</head>

        slides[adIndex].classList.remove('active');
        adIndex = (adIndex + 1) % slides.length;
        slides[adIndex].classList.add('active');
    }, 4000);

    function openCurrentAd() {
        const prodId = parseInt(slides[adIndex].getAttribute('data-prod-id'));
        openProduct(prodId);
    }

    function filterMenu(cat, e) {
        if(e) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
        }
        const grid = document.getElementById('menu-grid');
        const filtered = products.filter(p => p.cat === cat);
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProduct(${p.id})">
                <img src="${p.img}" class="product-img">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <span class="price-tag">تبدأ من ${Object.values(p.prices)[0]} ₪</span>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        currentP = products.find(p => p.id === id);
        selectedSize = Object.keys(currentP.prices)[0];
        currentQty = 1;
        document.getElementById('mQty').innerText = currentQty;
        document.getElementById('mTitle').innerText = currentP.name;
        document.getElementById('mDesc').innerText = currentP.desc;
        document.getElementById('mExtraGroup').style.display = currentP.cat === 'pizza' ? 'block' : 'none';
        document.getElementById('mCrust').checked = false;
        renderSizes();
        calculateLivePrice();
        document.getElementById('productModal').style.display = 'flex';
    }

    function renderSizes() {
        const container = document.getElementById('mSizes');
        container.innerHTML = Object.keys(currentP.prices).map(s => `
            <div class="size-btn ${s === selectedSize ? 'selected' : ''}" onclick="selectSize('${s}')">
                ${s}<br><small>${currentP.prices[s]} ₪</small>
            </div>
        `).join('');
    }

    function selectSize(s) { selectedSize = s; renderSizes(); calculateLivePrice(); }
    
    function updateQty(v) { 
        currentQty = Math.max(1, currentQty + v); 
        document.getElementById('mQty').innerText = currentQty; 
        calculateLivePrice(); 
    }

    function calculateLivePrice() {
        let price = currentP.prices[selectedSize];
        if(currentP.cat === 'pizza' && document.getElementById('mCrust').checked) {
            price += (selectedSize === 'S' ? 10 : (selectedSize === 'M' ? 15 : 20));
        }
        document.getElementById('addBtn').innerText = `إضافة (${price * currentQty} ₪)`;
    }

    function addToCart() {
        let price = currentP.prices[selectedSize];
        let extra = "";
        if(currentP.cat === 'pizza' && document.getElementById('mCrust').checked) {
            price += (selectedSize === 'S' ? 10 : (selectedSize === 'M' ? 15 : 20));
            extra = " + أطراف جبنة";
        }
        cart.push({ name: currentP.name, size: selectedSize, qty: currentQty, total: price * currentQty, details: extra });
        updateCartUI();
        closeModals();
    }

    function updateCartUI() {
        const count = cart.reduce((s, i) => s + i.qty, 0);
        const total = cart.reduce((s, i) => s + i.total, 0);
        document.getElementById('cCount').innerText = count;
        document.getElementById('cTotal').innerText = total + " ₪";
        document.getElementById('cartBar').style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function openCart() {
        const list = document.getElementById('cartItemsList');
        list.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <span>${item.name} (x${item.qty})${item.details}</span>
                <span>${item.total} ₪ <button onclick="removeFromCart(${i})" style="color:red; border:none; background:none;">✕</button></span>
            </div>
        `).join('');
        document.getElementById('cartModal').style.display = 'flex';
    }

    function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); if(cart.length===0) closeModals(); else openCart(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function checkout() {
        const name = document.getElementById('custName').value;
        const loc = document.getElementById('custLoc').value;
        if(!name || !loc) return alert("يرجى إدخال البيانات");
        let msg = `🍕 *طلب جديد من هافين بيتزا*\n👤 *الزبون:* ${name}\n📍 *العنوان:* ${loc}\n🚚 *النوع:* ${document.getElementById('orderType').value}\n\n`;
        cart.forEach((it, i) => msg += `${i+1}. ${it.name} (x${it.qty})${it.details} - ${it.total} ₪\n`);
        msg += `\n💵 *المجموع: ${cart.reduce((s, i) => s + i.total, 0)} ₪*`;
        window.open(`https://wa.me/${whatsappNum}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    filterMenu('pizza');
</script>
</body>
</html>
